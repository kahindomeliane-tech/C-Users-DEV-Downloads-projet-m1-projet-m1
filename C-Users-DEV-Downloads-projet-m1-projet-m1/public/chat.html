<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Sécurisé</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="chat-container">

    <div class="header">
        <div>Secure Chat</div>
        <button onclick="logout()" class="btn-logout">Déconnexion</button>
    </div>

    <div id="messages"></div>

    <div class="bottom">

        <input type="text" id="messageInput" placeholder="Écrivez votre message...">

        <button onclick="sendMessage()">Envoyer</button>

        <input type="file" id="fileInput" title="Sélectionner un fichier à partager">

        <button onclick="uploadFile()">Partager fichier</button>

    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
