<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Chat</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #111;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        .chat-container {
            max-width: 600px;
            margin: 40px auto;
            border: 1px solid #333;
            border-radius: 8px;
            background: #1c1c1c;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .header {
            background: #0d6efd;
            color: white;
            padding: 15px;
            font-size: 20px;
            display: flex;
            justify-content: space-between;
        }
        #messages {
            height: 300px;
            overflow-y: auto;
            padding: 10px;
            border-bottom: 1px solid #333;
        }
        .bottom {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .bottom input, .bottom button, .bottom select {
            padding: 10px;
            border-radius: 6px;
            border: none;
        }
        .emoji-bar {
            display: flex;
            gap: 8px;
            padding: 10px;
            border-top: 1px solid #333;
            background: #222;
        }
        .emoji-bar span {
            cursor: pointer;
            font-size: 20px;
        }
        button {
            background: #00a884;
            color: white;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover {
            background: #00d1a1;
        }
    </style>
</head>
<body>

<div class="chat-container">

    <div class="header">
        <div>💬 Mini WhatsApp</div>
        <div class="header-user" id="userDisplay"></div>
    </div>

    <div id="messages"></div>

    <!-- Barre d'emojis -->
    <div class="emoji-bar">
        <span onclick="addEmoji('😀')">😀</span>
        <span onclick="addEmoji('😂')">😂</span>
        <span onclick="addEmoji('😍')">😍</span>
        <span onclick="addEmoji('👍')">👍</span>
        <span onclick="addEmoji('🔥')">🔥</span>
        <span onclick="addEmoji('❤️')">❤️</span>
    </div>

    <div class="bottom">
        <!-- Sélecteur de groupe -->
        <select id="groupSelect" title="Sélectionner un groupe">
            <option value="Groupe1">Groupe 1</option>
            <option value="Groupe2">Groupe 2</option>
            <option value="Groupe3">Groupe 3</option>
            <option value="Groupe4">Groupe 4</option>
            <option value="Groupe5">Groupe 5</option>
        </select>

        <input type="text" id="messageInput" placeholder="Écrivez votre message...">
        <button type="button" onclick="sendMessage()">Envoyer</button>

        <input type="file" id="fileInput" title="Sélectionner un fichier à partager">
        <div id="preview" class="file-preview"></div>
        <button type="button" onclick="uploadFile()">Partager fichier</button>
    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
<script>
    function addEmoji(emoji) {
        const input = document.getElementById("messageInput");
        input.value += emoji;
        input.focus();
    }

    function sendMessage() {
        const message = document.getElementById("messageInput").value;
        const group = document.getElementById("groupSelect").value;
        const username = localStorage.getItem("username") || "Invité";

        if (message.trim() !== "") {
            socket.emit("chat message", { username: username, message: message, group: group });
            document.getElementById("messageInput").value = "";
        }
    }

    function uploadFile() {
        const fileInput = document.getElementById("fileInput");
        const file = fileInput.files[0];
        const username = localStorage.getItem("username") || "Invité";

        if (file) {
            socket.emit("chat message", {
                username: username,
                message: `📁 Fichier partagé : ${file.name}`
            });
            document.getElementById("preview").innerText = "Fichier partagé : " + file.name;
        }
    }
</script>

</body>
</html>
