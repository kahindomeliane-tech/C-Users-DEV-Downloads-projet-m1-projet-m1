<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Chat</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #111;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        .chat-container {
            max-width: 600px;
            margin: 40px auto;
            border: 1px solid #333;
            border-radius: 8px;
            background: #1c1c1c;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .header {
            background: #0d6efd;
            color: white;
            padding: 15px;
            font-size: 20px;
            display: flex;
            justify-content: space-between;
        }
        #messages {
            height: 300px;
            overflow-y: auto;
            padding: 10px;
            border-bottom: 1px solid #333;
        }
        .bottom {
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .bottom input, .bottom button {
            flex: 1;
        }
        .emoji-bar {
            display: flex;
            gap: 8px;
            padding: 10px;
            border-top: 1px solid #333;
            background: #222;
        }
        .emoji-bar span {
            cursor: pointer;
            font-size: 20px;
        }
    </style>
</head>
<body>

<div class="chat-container">

    <div class="header">
        <div>💬 Mini WhatsApp</div>
        <div class="header-user" id="userDisplay"></div>
    </div>

    <div id="messages"></div>

    <!-- Barre d'emojis -->
    <div class="emoji-bar">
        <span onclick="addEmoji('😀')">😀</span>
        <span onclick="addEmoji('😂')">😂</span>
        <span onclick="addEmoji('😍')">😍</span>
        <span onclick="addEmoji('👍')">👍</span>
        <span onclick="addEmoji('🔥')">🔥</span>
        <span onclick="addEmoji('❤️')">❤️</span>
    </div>

    <div class="bottom">
        <input type="text" id="messageInput" placeholder="Écrivez votre message...">
        <button onclick="sendMessage()">Envoyer</button>
        <input type="file" id="fileInput" title="Sélectionner un fichier à partager">
        <div id="preview" class="file-preview"></div>
        <button onclick="uploadFile()">Partager fichier</button>
    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
<script>
    function addEmoji(emoji) {
        const input = document.getElementById("messageInput");
        input.value += emoji;
        input.focus();
    }
</script>

</body>
</html>
